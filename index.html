<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMC Workshop Portal</title>
    <style>
        :root { --primary: #0078d4; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; margin-top: 0; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e1e1e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .hidden { display: none; }
        .info { background: #eef6fc; padding: 10px; border-radius: 8px; margin-bottom: 15px; color: #005a9e; font-size: 14px; }
        .loader { display: none; margin-top: 10px; font-size: 14px; color: #666; text-align: center; }
        #empNameDisplay { margin-top: 10px; font-weight: bold; color: #005a9e; text-align: center; margin-bottom: 15px; }
        #help-link { margin-bottom: 15px; font-size: 0.9em; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📷 HMC Photo Upload</h2>
        
        <!-- Step 1: Job Verification -->
        <div id="step1">
            <input type="text" id="jobNum" placeholder="Enter Job Number: (e.g. AC123456)">
            <button id="verifyJobBtn" onclick="verifyJob()">Verify Job</button>
        </div>

        <!-- Step 2: Employee Verification -->
        <div id="step2" class="hidden">
            <div class="info" id="jobDetails"></div>
            
            <div id="help-link">
                <a href="https://harrymooregroup.sharepoint.com/:x:/s/HarryMooreCommercials64/IQBtXq35iBSYQorQee_QmawXAew1CDPy3N_vz_vDke5yBzY?e=Am7Ay8" target="_blank" rel="noopener noreferrer">
                    Don't know your employee number? Click here
                </a>
            </div>

            <input type="text" id="empNum" placeholder="Employee Number (e.g. 000)">
            <button id="verifyEmpBtn" onclick="verifyEmployee()">Confirm Employee</button>
            <div id="empNameDisplay"></div>
        </div>

        <!-- Step 3: Photo Upload -->
        <div id="step3" class="hidden">
            <input type="file" id="photo" accept="image/*" multiple>
            <button id="uploadBtn" onclick="uploadPhotos()">Upload Photos</button>
        </div>
        
        <div id="loader" class="loader">Processing...</div>
    </div>

    <script>
        const flowUrl = "https://default8acb70d7a0a24c419c692957995811.cf.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/00/workflows/6eb0c02d05f14973bf4eb13cede5a827/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=cn06fL-QBv-4XQNn6fSqy8p3CqJgZfA1w9v92qNWdj0";

        function toggleLoader(show) {
            document.getElementById('loader').style.display = show ? "block" : "none";
        }

        async function verifyJob() {
            const jobNum = document.getElementById('jobNum').value.toUpperCase().replace(/\s/g, '');
            if (!jobNum) { alert("Please enter a job number"); return; }

            toggleLoader(true);
            try {
                const res = await fetch(flowUrl, { 
                    method: "POST", 
                    headers: {"Content-Type":"application/json"}, 
                    body: JSON.stringify({action: "verify", jobNum: jobNum}) 
                });
                const data = await res.json();
                
                if (data.status === "found") {
                    document.getElementById('jobDetails').innerHTML = `<strong>Vehicle:</strong> ${data.registration}<br><strong>Job:</strong> ${data.description}`;
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                } else { alert("Job not found!"); }
            } catch (err) { alert("Connection error."); }
            toggleLoader(false);
        }

        async function verifyEmployee() {
            const rawEmpNum = document.getElementById('empNum').value;
            const empNum = rawEmpNum.padStart(3, '0');
            
            if (!rawEmpNum) { alert("Please enter employee number"); return; }

            toggleLoader(true);
            try {
                const res = await fetch(flowUrl, { 
                    method: "POST", 
                    headers: {"Content-Type":"application/json"}, 
                    body: JSON.stringify({action: "empverify", empNum: empNum}) 
                });
                const data = await res.json();

                if (data.status === "valid") {
                    document.getElementById('empNameDisplay').innerText = "Welcome, " + data.employeeName;
                    document.getElementById('help-link').style.display = 'none';
                    document.getElementById('empNum').classList.add('hidden');
                    document.getElementById('verifyEmpBtn').classList.add('hidden');
                    document.getElementById('step3').classList.remove('hidden');
                } else { alert("Invalid Employee Number!"); }
            } catch (err) { alert("Connection error."); }
            toggleLoader(false);
        }

        async function uploadPhotos() {
            const files = document.getElementById('photo').files;
            if (files.length === 0) { alert("Please select photos"); return; }
            
            const btn = document.getElementById('uploadBtn');
            const jobNum = document.getElementById('jobNum').value.toUpperCase().replace(/\s/g, '');
            const empNum = document.getElementById('empNum').value.padStart(3, '0');
            const allFileNames = Array.from(files).map(file => file.name);

            btn.disabled = true;
            btn.innerText = "Uploading...";
            
            const uploadPromises = Array.from(files).map((file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = async () => {
                        try {
                            const response = await fetch(flowUrl, { 
                                method: "POST", 
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ 
                                    action: "upload", 
                                    jobNum: jobNum,
                                    empNum: empNum,
                                    fileName: file.name, 
                                    fileContent: reader.result.split(',')[1],
                                    isLast: false
                                }) 
                            });
                            resolve(response);
                        } catch (err) { reject(err); }
                    };
                });
            });

            try {
                await Promise.all(uploadPromises);

                await fetch(flowUrl, { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        action: "upload", 
                        jobNum: jobNum,
                        empNum: empNum,
                        allFileNames: allFileNames,
                        isLast: true 
                    }) 
                });

                alert("Success! All photos uploaded.");
                location.reload();
            } catch (err) {
                alert("Upload failed.");
                btn.disabled = false;
                btn.innerText = "Upload Photos";
            }
        }
    </script>
</body>
</html>
