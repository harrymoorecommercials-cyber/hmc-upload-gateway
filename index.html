<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMC Workshop Portal</title>
    <style>
        :root { 
            --primary: #0078d4; 
            --primary-hover: #106ebe;
            --success: #107c10;
            --bg: #f0f2f5; 
            --card-bg: #ffffff;
            --text: #242424;
            --border: #d1d1d1;
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 15px;
        }

        .card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 420px; 
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        h2 { 
            color: var(--text); 
            margin-top: 0; 
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .step-container {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input { 
            width: 100%; 
            padding: 14px 16px; 
            margin: 4px 0 12px 0; 
            border: 2px solid var(--border); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background-color: #fafbfc;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0, 120, 212, 0.1);
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.25);
        }

        button:hover { 
            background: var(--primary-hover); 
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled { 
            background: #e0e0e0; 
            color: #888;
            cursor: not-allowed; 
            box-shadow: none;
        }

        .hidden { display: none !important; }

        .info { 
            background: #eef6fc; 
            border-left: 4px solid var(--primary);
            padding: 14px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            color: #004578; 
            font-size: 14px; 
            line-height: 1.5;
        }

        .loader { 
            display: none; 
            margin-top: 20px; 
            font-size: 15px; 
            font-weight: 500;
            color: var(--primary); 
            text-align: center; 
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0, 120, 212, 0.2);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 0.8s linear infinite;
            margin: 0 auto 8px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #empNameDisplay { 
            margin-top: 12px; 
            font-weight: 600; 
            color: var(--success); 
            text-align: center; 
            font-size: 15px;
        }

        #help-link { 
            margin-bottom: 15px; 
            font-size: 0.85em; 
            text-align: right; 
        }

        #help-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        #help-link a:hover {
            text-decoration: underline;
        }

        input[type="file"] {
            padding: 10px;
            background: #f8f9fa;
            border: 2px dashed var(--border);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>📷 HMC Portal</h2>
        
        <!-- Step 1: Job Verification -->
        <div id="step1" class="step-container">
            <label for="jobNum">Job Number</label>
            <input type="text" id="jobNum" placeholder="e.g. AC123456" autocomplete="off">
            <button id="verifyJobBtn" onclick="verifyJob()">Verify Job</button>
        </div>

        <!-- Step 2: Employee Verification -->
        <div id="step2" class="step-container hidden">
            <div class="info" id="jobDetails"></div>
            
            <div id="help-link">
                <a href="https://harrymooregroup.sharepoint.com/:x:/s/HarryMooreCommercials64/IQBtXq35iBSYQorQee_QmawXAew1CDPy3N_vz_vDke5yBzY?e=Am7Ay8" target="_blank" rel="noopener noreferrer">
                    Forgot employee number?
                </a>
            </div>

            <label for="empNum">Employee Number</label>
            <input type="text" id="empNum" placeholder="e.g. 000" autocomplete="off">
            
            <label for="empPin">PIN</label>
            <input type="password" id="empPin" placeholder="Enter PIN" maxlength="6">
            
            <button id="verifyEmpBtn" onclick="verifyEmployee()">Confirm Details</button>
            <div id="empNameDisplay"></div>
        </div>

        <!-- Step 3: Photo & Video Upload -->
        <div id="step3" class="step-container hidden">
            <label for="photo">Select Files (Photos & Videos)</label>
            <input type="file" id="photo" accept="image/*,video/*" multiple>
            <button id="uploadBtn" onclick="uploadPhotos()">Upload Files</button>
        </div>
        
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <span id="loaderText">Processing...</span>
        </div>
    </div>

    <script>
        const flowUrl = "https://default8acb70d7a0a24c419c692957995811.cf.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/00/workflows/6eb0c02d05f14973bf4eb13cede5a827/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=cn06fL-QBv-4XQNn6fSqy8p3CqJgZfA1w9v92qNWdj0";

        function toggleLoader(show, text = "Processing...") {
            const loader = document.getElementById('loader');
            document.getElementById('loaderText').innerText = text;
            loader.style.display = show ? "block" : "none";
        }

        async function verifyJob() {
            const jobNum = document.getElementById('jobNum').value.toUpperCase().replace(/\s/g, '');
            if (!jobNum) { alert("Please enter a job number"); return; }

            toggleLoader(true, "Checking Job...");
            try {
                const res = await fetch(flowUrl, { 
                    method: "POST", 
                    headers: {"Content-Type":"application/json"}, 
                    body: JSON.stringify({action: "verify", jobNum: jobNum}) 
                });
                const data = await res.json();
                
                if (data.status === "found") {
                    document.getElementById('jobDetails').innerHTML = `<strong>Vehicle:</strong> ${data.registration}<br><strong>Job:</strong> ${data.description}`;
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                } else { alert("Job not found!"); }
            } catch (err) { alert("Connection error."); }
            toggleLoader(false);
        }

        async function verifyEmployee() {
            const rawEmpNum = document.getElementById('empNum').value;
            const empNum = rawEmpNum.padStart(3, '0');
            const empPin = document.getElementById('empPin').value;
            
            if (!rawEmpNum || !empPin) { alert("Please enter both Employee Number and PIN"); return; }

            toggleLoader(true, "Verifying Employee...");
            try {
                const res = await fetch(flowUrl, { 
                    method: "POST", 
                    headers: {"Content-Type":"application/json"}, 
                    body: JSON.stringify({
                        action: "empverify", 
                        empNum: empNum,
                        empPin: empPin 
                    }) 
                });
                const data = await res.json();

                if (data.status === "valid") {
                    document.getElementById('empNameDisplay').innerText = "✓ Welcome, " + (data.employeeName || data.name || "");
                    document.getElementById('help-link').style.display = 'none';
                    document.getElementById('empNum').classList.add('hidden');
                    document.getElementById('empPin').classList.add('hidden');
                    document.getElementById('verifyEmpBtn').classList.add('hidden');
                    document.querySelectorAll('label[for="empNum"], label[for="empPin"]').forEach(l => l.style.display = 'none');
                    document.getElementById('step3').classList.remove('hidden');
                } else { alert("Invalid Employee Number or PIN!"); }
            } catch (err) { alert("Connection error."); }
            toggleLoader(false);
        }

        async function uploadPhotos() {
            const files = document.getElementById('photo').files;
            if (files.length === 0) { alert("Please select files"); return; }
            
            const btn = document.getElementById('uploadBtn');
            const jobNum = document.getElementById('jobNum').value.toUpperCase().replace(/\s/g, '');
            const empNum = document.getElementById('empNum').value.padStart(3, '0');
            const allFileNames = Array.from(files).map(file => file.name);

            btn.disabled = true;
            btn.innerText = "Uploading Files...";
            toggleLoader(true, `Uploading ${files.length} file(s)...`);
            
            const uploadPromises = Array.from(files).map((file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = async () => {
                        try {
                            const response = await fetch(flowUrl, { 
                                method: "POST", 
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ 
                                    action: "upload", 
                                    jobNum: jobNum,
                                    empNum: empNum,
                                    fileName: file.name, 
                                    fileContent: reader.result.split(',')[1],
                                    isLast: false
                                }) 
                            });
                            resolve(response);
                        } catch (err) { reject(err); }
                    };
                });
            });

            try {
                await Promise.all(uploadPromises);

                await fetch(flowUrl, { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        action: "upload", 
                        jobNum: jobNum,
                        empNum: empNum,
                        allFileNames: allFileNames,
                        isLast: true 
                    }) 
                });

                toggleLoader(false);
                alert("Success! All files uploaded.");
                location.reload();
            } catch (err) {
                toggleLoader(false);
                alert("Upload failed.");
                btn.disabled = false;
                btn.innerText = "Upload Files";
            }
        }
    </script>
</body>
</html>
